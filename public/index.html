<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#000000" />
  <title>Event Page Generator</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <!-- Navigation Dropdown -->
  <div class="nav-dropdown" id="navDropdown">
    <button class="nav-toggle" id="navToggle" type="button" aria-label="Menu">
      <span class="nav-toggle-icon" aria-hidden="true"></span>
    </button>
    <div class="nav-menu" role="menu" aria-label="Site navigation">
      <a href="https://www.xodiamediagroup.com/" target="_top" rel="noopener">Home</a>
      <a href="https://www.xodiamediagroup.com/upcoming-events" target="_top" rel="noopener">Upcoming Events</a>
      <a href="https://www.xodiamediagroup.com/contact" target="_top" rel="noopener">Contact Us</a>
      <a href="https://www.xodiamediagroup.com/tools" target="_top" rel="noopener">Tools</a>
    </div>
  </div>

  <main class="app-shell">
    <aside class="sidebar" aria-label="Upcoming event editor">
      <header class="sidebar-header">
        <div class="sidebar-title-row">
          <h1>Event Page Generator</h1>
          <a class="mode-toggle" href="/event_code_block.html" aria-label="Switch to Event Code Block Generator" title="Switch to Event Code Block Generator">
            <span class="mode-toggle-knob" aria-hidden="true"></span>
          </a>
        </div>
      </header>

      <section class="sidebar-controls" aria-labelledby="event-count-label">
        <label id="event-count-label" for="eventCount">Number of Events to Add</label>
        <input id="eventCount" type="number" min="1" max="20" step="1" inputmode="numeric" />
        <p class="field-hint">Only complete events dated today or later are included.</p>
      </section>

      <div id="eventEditors" class="event-editors" aria-live="polite"></div>

      <footer class="sidebar-footer">
        <div id="saveIndicator" class="save-indicator" role="status" aria-live="polite"></div>
        <div id="pageStatus" class="page-status" role="status"></div>
        <div class="footer-actions">
          <button id="copyCodeButton" class="copy-button" type="button">Copy Code</button>
          <button id="savePageButton" class="save-button" type="button">Save</button>
        </div>
      </footer>
    </aside>

    <section class="viewport-panel" aria-label="Live generated page preview">
      <div class="viewport-toolbar">
        <div>
          <span class="viewport-label">Live Page Preview</span>
        </div>
        <img class="viewport-logo" src="/white.svg" alt="AIGOX Software" />
      </div>
      <div class="viewport-frame-shell">
        <iframe
          id="pagePreview"
          title="Upcoming events page preview"
          sandbox="allow-scripts allow-same-origin allow-popups allow-popups-to-escape-sandbox"
        ></iframe>
      </div>
    </section>
  </main>

  <script src="/app.js"></script>
</body>
</html>
